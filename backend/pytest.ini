[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Add the backend/ directory to sys.path so that `db`, `ml`, `api` packages resolve
pythonpath = .
addopts = -v --tb=short
# Suppress noisy third-party library warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
