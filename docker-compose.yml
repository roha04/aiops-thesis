version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.0.0
    container_name: aiops-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  postgres:
    image: postgres:15-alpine
    container_name: aiops-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aiops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aiops-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: aiops-backend
    ports:
      - "8000:8000"
    environment:
      ELASTICSEARCH_HOST: elasticsearch
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aiops
      REDIS_URL: redis://redis:6379
    depends_on:
      - elasticsearch
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: python main.py

  frontend:
    build: ./frontend
    container_name: aiops-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  elasticsearch_data:
  postgres_data: